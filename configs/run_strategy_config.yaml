symbols: 
  - BTC/USD
  - LINK/BTC
  - UNI/US
  - BCH/USD
  - AAPL
  - DELL
data_preference: yf # 'yf' - yfinance, 'alpaca' - fetch from alpaca, 'longer_period' - use whichever source has more data
rolling_split_params: 
  n_periods: 15
  period_ratio: 0.35
  period_years_max: 3
strategies: 
  - hhhl  
strategy_params:
  hhhl:
    fees: 0.001
    slippage: 0.0001
    stop_loss: 0.1
    param_ranges:
      window_entry: [2, 9]
      hh_hl_counts: [1, 5]
      window_exit: [2, 9]
      lh_counts: [1, 5]
eval_params:
  filters:
    sharpe_ratio_min: 0
    total_returns_min: 0
    trades_in_year_min: 6
  clustering:
    explore: true
    max_clusters: 40
    dataset_size_for_max_clusters: 700
    scaling_factor: 20 # 1 cluster per 20 parameter combinations
    min_items_to_cluster: 100
    cluster_cols:
      - Total Return [%]_mean
      - Sharpe Ratio_mean
      - Max Drawdown [%]_mean
      - Total Trades_mean
      - Total Return [%]_std_perc
      - Sharpe Ratio_std_perc
      - Sharpe Ratio_min
      - Total Return [%]_min
      - Total Trades_min
    filters:
      trades_in_year_mean: 20 # minimum average trades per year
      sharpe_ratio_mean: 0.6 # note: higher SR correlates with longer periods — consider normalising as % of max SR
      items_from_cluster_nr: 5 # number of candidates selected per cluster
  final_params:
    final_params_nr: 5
    force: false # if true, relax filters when fewer than final_params_nr survive; if 5–min_items_to_cluster, relax cluster filters
    # when count hits 100: cluster; if post-cluster filter yields < 5, relax cluster filters to get at least 5, then sort by std and take top 5