p1:
  symbols:
    AAPL:
      hhhl:
        params:
          window_entry: 3
          hh_hl_counts: 1
          window_exit: 4
          lh_counts: 4
        stoploss: 0.05
        take_profit: 0.2
    BTC/USD:
      hhhl:
        params:
          window_entry: 3
          hh_hl_counts: 1
          window_exit: 7
          lh_counts: 4
        stoploss: 0.05
        take_profit: 0.2
    DELL:
      hhhl:
        params:
          window_entry: 8
          hh_hl_counts: 2
          window_exit: 2
          lh_counts: 2
        stoploss: 0.05
        take_profit: 0.2
    SPOT:
      hhhl:
        params:
          window_entry: 2
          hh_hl_counts: 1
          window_exit: 4
          lh_counts: 4
        stoploss: 0.05
        take_profit: 0.2
  weights: 
    initial: equal
    running: equal
  portfolio_size: 5000
  data_preference: alpaca
  min_available_cash: 100
p2:
  symbols:
    NVDA:
      hhhl:
        params:
          window_entry: 3
          hh_hl_counts: 1
          window_exit: 5
          lh_counts: 4
        stoploss: 0.05
        take_profit: 0.2
    MSFT:
      hhhl:
        params:
          window_entry: 2
          hh_hl_counts: 1
          window_exit: 8
          lh_counts: 5
        stoploss: 0.05
        take_profit: 0.2
    AMZN:
      hhhl:
        params:
          window_entry: 8
          hh_hl_counts: 2
          window_exit: 2
          lh_counts: 2
        stoploss: 0.05
        take_profit: 0.2
  weights: 
    initial: equal
    running: win_rate
    running_params:
        min_trades: 5
        min_weight: 0.05 # e.g. max 20 symbols per portfolio
        min_symbols: 2 # minimum symbols required to calculate running weights; symbols without enough trades receive minimum weight
  portfolio_size: 5000
  data_preference: yf
  min_available_cash: 100

